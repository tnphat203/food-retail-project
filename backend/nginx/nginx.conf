server {
    listen 80;
    server_name api.tranngocphat.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.tranngocphat.me;

    ssl_certificate /etc/letsencrypt/live/api.tranngocphat.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tranngocphat.me/privkey.pem;

    location / {
        proxy_pass http://food_retail_app:10000;

        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}